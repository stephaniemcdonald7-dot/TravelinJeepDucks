<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Submissions - Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .back-link { color: #ffcc00; text-decoration: none; font-weight: bold; margin-bottom: 30px; display: inline-block; }
        .submissions-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        .duck-card { background-color: #1e1e1e; border-left: 5px solid #ffcc00; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .duck-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.3rem; display: flex; justify-content: space-between; align-items: center; }
        .duck-location { font-size: 0.9rem; background-color: rgba(255, 204, 0, 0.1); color: #ffcc00; padding: 4px 10px; border-radius: 20px; }
        .duck-story { color: #a0a0a0; line-height: 1.5; margin: 0; }
        .loading-text { text-align: center; color: #a0a0a0; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>Recent Duck Sightings</h1>
    <a href="index.html" class="back-link">← Back to Map</a>

    <div class="submissions-container" id="submissionsList">
        <div class="loading-text">Tracking down the ducks... 🦆</div>
    </div>

    <div class="duck-card">
    <h3>User Name <span class="duck-location">📍 Location</span></h3>
    <img src="filename-you-uploaded.png" style="width:100%; border-radius:8px;">
</div>

    <script>
        // USE THE EXACT SAME SCRIPT_URL AS YOUR MAIN PAGE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5dtjDjpVNJxgSMFoJMvqxKuX1eMtMZuc2HiTcr5yRR50IRRwcERnvnKlXBDxwsTUY/exec';

        async function fetchSubmissions() {
            const container = document.getElementById('submissionsList');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                container.innerHTML = ''; 

                if (data.length === 0) {
                    container.innerHTML = '<div class="loading-text">No ducks logged yet. Be the first!</div>';
                    return;
                }

                // Loop through data and create cards
                data.forEach(duck => {
                    const card = document.createElement('div');
                    card.className = 'duck-card';
                    card.innerHTML = `
                        <h3>${duck.Name || 'Anonymous'} <span class="duck-location">📍 ${duck.Location || 'Unknown'}</span></h3>
                        <p class="duck-story">"${duck.Notes || 'No story provided.'}"</p>
                    `;
                    container.insertBefore(card, container.firstChild);
                });

            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = '<div class="loading-text" style="color: #ff3333;">Failed to load. Is your Apps Script deployed?</div>';
            }
        }

        fetchSubmissions();
    </script>
</body>
</html>
