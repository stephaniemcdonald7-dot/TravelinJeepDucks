<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duck Postcards</title>
    <style>
        body { background-color: #121212; color: #333; font-family: 'Courier New', sans-serif; padding: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .postcard { 
            background: #fff; padding: 20px 20px 40px 20px; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); 
            transform: rotate(-2deg); transition: 0.3s;
            border-radius: 4px;
        }
        .postcard:hover { transform: rotate(0deg) scale(1.05); }
        .postcard img { width: 100%; height: 200px; object-fit: cover; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
        .postcard h3 { margin: 10px 0 5px 0; color: #b48a04; font-family: sans-serif; }
        .postcard p { margin: 5px 0; font-size: 0.9em; line-height: 1.4; color: #333; }
        .back-link { color: #ffcc00; display: inline-block; margin-bottom: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Map</a>
    
    <div class="gallery" id="submissionsList">
        <div style="color: white;">Tracking down the ducks... 🦆</div>
    </div>

<script type="module">
  // 1. Import Firebase SDK Core Modules via CDN
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 2. Verified configuration matching your index.html exactly
  const firebaseConfig = {
    apiKey: "AIzaSyD-hoTeWLJRsnheCZvEWFGwdxlfvL0Q6Uk",
    authDomain: "travelinjeepducks.firebaseapp.com",
    projectId: "travelinjeepducks",
    storageBucket: "travelinjeepducks.firebasestorage.app",
    messagingSenderId: "636331255328",
    appId: "1:636331255328:web:60fefdad9007d111d0fe45",
    measurementId: "G-79Z5FD1MF3"
  };

  // 3. Initialize services
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Targets your gallery grid container ID directly
  const container = document.getElementById('submissionsList');

  async function displaySubmissions() {
    try {
      // Fetch data sorting by newest timestamp first
      const q = query(collection(db, "duck_finds"), orderBy("timestamp", "desc"));
      const querySnapshot = await getDocs(q);
      
      if (container) container.innerHTML = "";

      if (querySnapshot.empty) {
        container.innerHTML = `<p style="text-align:center; color:#888; grid-column: 1/-1;">No ducks found yet. Be the first to log one!</p>`;
        return;
      }

      querySnapshot.forEach((doc) => {
        const duck = doc.data();
        const dateLogged = duck.timestamp ? new Date(duck.timestamp.seconds * 1000).toLocaleDateString() : "Recently";

        // Formats your items cleanly inside your custom .postcard styles
        const cardHTML = `
          <div class="postcard">
            ${duck.photoUrl ? `<img src="${duck.photoUrl}" alt="Jeep Duck Sighting" />` : `<div style="width:100%; height:200px; background:#e0e0e0; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#666; margin-bottom:10px;">📸 No Photo Provided</div>`}
            <h3>🦆 ${duck.username || 'Anonymous'}</h3>
            <p style="font-size:0.8em; color:#777; margin-bottom:10px;">Logged: ${dateLogged}</p>
            <p><b>📍 Location:</b> ${duck.locationText || 'On the road'}</p>
            <p style="margin-top:8px; font-style:italic; color:#444;">"${duck.notes || 'No message left.'}"</p>
          </div>
        `;

        if (container) {
          container.insertAdjacentHTML('beforeend', cardHTML);
        }
      });

    } catch (error) {
      console.error("Error fetching submissions feed:", error);
      if (container) {
        container.innerHTML = `<p style="text-align:center; color:#ef4444; grid-column:1/-1;">Failed to load submissions feed.</p>`;
      }
    }
  }

  // Load postings on window render
  displaySubmissions();
</script>
</body>
</html>
