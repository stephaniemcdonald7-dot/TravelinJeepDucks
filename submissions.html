<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duck Postcards</title>
    <style>
        body { background-color: #121212; color: #333; font-family: 'Courier New', sans-serif; padding: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .postcard { 
            background: #fff; padding: 20px 20px 40px 20px; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); 
            transform: rotate(-2deg); transition: 0.3s;
        }
        .postcard:hover { transform: rotate(0deg) scale(1.05); }
        .postcard img { width: 100%; height: 200px; object-fit: cover; border: 1px solid #ddd; }
        .postcard h3 { margin: 15px 0 5px 0; color: #d4af37; }
        .back-link { color: #ffcc00; display: inline-block; margin-bottom: 30px; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Map</a>
    <div class="gallery" id="submissionsList">
        <div style="color: white;">Tracking down the ducks... 🦆</div>
    </div>

    <script>
        // Use your NEW Script URL here
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmuFK1oyzLH3Q6w7r6z7W2kEkzM94BZZRgFCh0kCqqnhGhBplLys6Vg-hIe589pjME/exec';

        async function loadDucks() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const list = document.getElementById('submissionsList');
                list.innerHTML = '';
                
                data.forEach(duck => {
                    const div = document.createElement('div');
                    div.className = 'postcard';
                    div.innerHTML = `
                        <img src="${duck.ImageURL}" alt="Duck">
                        <h3>${duck.Name}</h3>
                        <p>📍 ${duck.Location}</p>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                document.getElementById('submissionsList').innerHTML = '<h2 style="color:red;">Failed to load. Did you redeploy the script?</h2>';
            }
        }
        loadDucks();
    </script>
</body>
</html>
