<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ... [Keep all your existing CSS here] ... */
        /* Ensure these overrides are present: */
        .map-container { 
            width: 90%; 
            max-width: 900px; 
            height: 500px; 
            margin-bottom: 50px; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 2px solid #2c2c2c; 
            z-index: 10; 
            position: relative; 
        }
        #map { width: 100%; height: 100%; background: #121212; }
    </style>
</head>
<body>

    <div class="map-container"> 
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map
        const map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Define Custom Duck Icon
        const duckIcon = L.icon({
            iconUrl: 'Yellow Duck.png', // Ensure this matches your file name
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4zCNXoLEaws_WXEgIvlIxyGBei18vC-eD14hv9ZmQUC1oka7dXY3mgLq4ZFlLYgXT/exec';

        // 2. Load and Plot Data
        function loadDucks() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    data.forEach(duck => {
                        const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(duck.Location)}`;
                        fetch(geoUrl)
                            .then(res => res.json())
                            .then(geo => {
                                if (geo.length > 0) {
                                    L.marker([geo[0].lat, geo[0].lon], { icon: duckIcon }).addTo(map)
                                     .bindPopup(`<b>${duck.Name}</b><br>${duck.Notes}`);
                                }
                            });
                    });
                });
        }
        loadDucks();

        // 3. Modal and Form Logic
        const modal = document.getElementById('formModal');
        const openBtn = document.getElementById('openFormBtn');
        const closeBtn = document.getElementById('closeFormBtn');
        const form = document.getElementById('duckForm');
        const statusDiv = document.getElementById('form-status');

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            statusDiv.textContent = ''; 
            form.reset();
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = form.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging Duck...';
            
            const formData = new FormData();
            formData.append('Name', document.getElementById('finderName').value);
            formData.append('Location', document.getElementById('duckLocation').value);
            formData.append('Notes', document.getElementById('duckNotes').value);

            fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams(formData) })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    statusDiv.textContent = 'Duck logged successfully! 🦆';
                    loadDucks(); // Refresh map
                    setTimeout(() => modal.classList.remove('active'), 1500);
                }
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Log Entry';
            });
        });
    </script>
</body>
</html>
