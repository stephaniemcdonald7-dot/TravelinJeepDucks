<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- ALL YOUR CSS GOES HERE --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; position: relative; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); width: 100%; box-sizing: border-box; z-index: 10; position: relative; }
        .title-container { display: flex; align-items: center; justify-content: center; gap: 15px; max-width: 900px; margin: 0 auto 10px auto; }
        .title-duck { width: 50px; height: auto; }
        h1 { color: #ffcc00; margin: 0; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { color: #a0a0a0; font-size: 1.1rem; max-width: 600px; margin: 15px auto 0 auto; line-height: 1.5; }
        .cta-container { margin: 30px 0; text-align: center; z-index: 10; position: relative; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; padding: 0 20px; }
        .btn-log, .btn-view { display: inline-block; font-weight: bold; font-size: 1.2rem; padding: 18px 35px; border-radius: 50px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .btn-log { background-color: #ffcc00; color: #121212; border: none; }
        .btn-view { background-color: transparent; color: #ffcc00; border: 2px solid #ffcc00; }
        
        /* Map Styles */
        .map-container { width: 90%; max-width: 900px; height: 500px; margin-bottom: 50px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #2c2c2c; z-index: 10; position: relative; }
        #map { width: 100%; height: 100%; background: #121212; }
        
        /* ... Add your other existing styles (duck-pattern, modal, etc.) here ... */
    </style>
</head>
<body>

    <div class="duck-pattern">
        </div>

    <header>
        </header>

    <div class="cta-container">
        </div>

    <div class="map-container"> 
        <div id="map"></div>
    </div>

    <footer>
        © 2026 Travelin' Jeep Ducks. All rights reserved.
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... Your JavaScript logic ...
    </script>
</body>
</html>
