<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <style>
        /* Modern, clean dark theme with a vibrant accent color */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        /* Title frame setup to hold images next to text */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto 10px auto;
        }

        .title-duck {
            width: 50px; /* Size of ducks framing title */
            height: auto;
        }

        h1 {
            color: #ffcc00; /* Classic duck yellow */
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 15px auto 0 auto;
            line-height: 1.5;
        }

        .cta-container {
            margin: 30px 0;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Large, unmissable button for users scanning on mobile */
        .btn-log {
            display: inline-block;
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-log:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.5);
        }

        .btn-log:active {
            transform: translateY(1px);
        }

        .map-container {
            width: 90%;
            max-width: 900px;
            height: 500px;
            margin-bottom: 50px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #2c2c2c;
            z-index: 10;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Dense Scattered Background Chibi Duck Layout Styles */
        .duck-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            pointer-events: none; /* Let users click straight through to map/buttons */
            z-index: 1; /* Places images safely behind main text structures */
        }

        .duck-item {
            position: absolute;
            width: 85px; /* Standard layout size */
            height: auto;
            opacity: 0.9; /* Keeps them bright and colored as requested */
        }

        /* Grid placement coordinates surrounding center content */
        .d1 { top: 12%; left: 3%; transform: rotate(-15deg); }
        .d2 { top: 8%; left: 22%; transform: rotate(25deg); width: 110px; }
        .d3 { top: 18%; left: 14%; transform: rotate(-10deg); }
        .d4 { top: 28%; left: 5%; transform: rotate(15deg); }
        
        .d5 { top: 5%; right: 4%; transform: rotate(10deg); }
        .d6 { top: 15%; right: 18%; transform: rotate(-20deg); }
        .d7 { top: 24%; right: 8%; transform: rotate(12deg); width: 100px; }
        
        .d8 { top: 40%; left: 2%; transform: rotate(-5deg); }
        .d9 { top: 48%; left: 15%; transform: rotate(18deg); }
        .d10 { top: 62%; left: 6%; transform: rotate(-25deg); }
        
        .d11 { top: 38%; right: 1%; transform: rotate(20deg); }
        .d12 { top: 52%; right: 12%; transform: rotate(-15deg); }
        .d13 { top: 65%; right: 4%; transform: rotate(10deg); }

        .d14 { bottom: 18%; left: 4%; transform: rotate(15deg); }
        .d15 { bottom: 8%; left: 16%; transform: rotate(-12deg); }
        .d16 { bottom: 22%; left: 25%; transform: rotate(8deg); }

        .d17 { bottom: 19%; right: 3%; transform: rotate(-20deg); }
        .d18 { bottom: 7%; right: 14%; transform: rotate(15deg); }
        .d19 { bottom: 25%; right: 22%; transform: rotate(-5deg); }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="duck-pattern">
        <img src="Yellow Duck Hat.png" class="duck-item d1" alt="Chibi Duck">
        <img src="Orange Stripe Duck.png" class="duck-item d2" alt="Chibi Duck">
        <img src="Teal Duck with Leaf.png" class="duck-item d3" alt="Chibi Duck">
        <img src="Blue Star Duck.png" class="duck-item d4" alt="Chibi Duck">
        
        <img src="Blue Star Duck.png" class="duck-item d5" alt="Chibi Duck">
        <img src="Yellow Duck.png" class="duck-item d6" alt="Chibi Duck">
        <img src="Rainbow Duck.png" class="duck-item d7" alt="Chibi Duck">
        
        <img src="Orange Duck.png" class="duck-item d8" alt="Chibi Duck">
        <img src="Pink Dot Duck.png" class="duck-item d9" alt="Chibi Duck">
        <img src="Purple Googles Duck.png" class="duck-item d10" alt="Chibi Duck">
        
        <img src="Teal Duck.png" class="duck-item d11" alt="Chibi Duck">
        <img src="Orange Duck.png" class="duck-item d12" alt="Chibi Duck">
        <img src="Yellow Duck Hat.png" class="duck-item d13" alt="Chibi Duck">
        
        <img src="Orange Stripe Duck.png" class="duck-item d14" alt="Chibi Duck">
        <img src="Rainbow Duck.png" class="duck-item d15" alt="Chibi Duck">
        <img src="Teal Duck with Leaf.png" class="duck-item d16" alt="Chibi Duck">
        
        <img src="Purple Googles Duck.png" class="duck-item d17" alt="Chibi Duck">
        <img src="Orange Duck.png" class="duck-item d18" alt="Chibi Duck">
        <img src="Pink Dot Duck.png" class="duck-item d19" alt="Chibi Duck">
    </div>

    <header>
        <div class="title-container">
            <img src="Teal Duck with Leaf.png" class="title-duck" alt="Chibi Duck">
            
            <h1>Travelin' Jeep Ducks</h1>
            
            <img src="Purple Googles Duck.png" class="title-duck" alt="Chibi Duck">
        </div>
        <p class="subtitle">You found a duck! This little bird is on an epic cross-country road trip. Check out the map below to see where it's been, and log your location to keep the journey going!</p>
    </header>

    <div class="cta-container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf-73IE035uWizBMzmJ5ILhL38AEsig5vWb_olGx43tFLxMyQ/viewform?usp=publish-editor" target="_blank" class="btn-log">📍 I FOUND A DUCK! LOG IT HERE</a>
    </div>

    <div class="map-container">
        <iframe src="https://www.google.com/maps/d/embed?mid=1CKMI4vBF9BzP09ifWqQ9XzQEPqMDfCU&ehbc=2E312F"></iframe>
    </div>

    <footer>
        © 2026 Travelin' Jeep Ducks. Duck, Duck, Jeep!
    </footer>

</body>
</html>
