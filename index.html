<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .duck-flock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .duck-item { position: absolute; width: 80px; opacity: 0.7; }
        header, .btn-container, .map-container, .modal-overlay { position: relative; z-index: 100; }
        .btn-container { display: flex; gap: 15px; margin: 20px 0; pointer-events: auto; }
        .map-container { width: 90%; max-width: 900px; height: 500px; margin: 20px 0; border-radius: 12px; overflow: hidden; border: 2px solid #ffcc00; pointer-events: auto; }
        #map { width: 100%; height: 100%; z-index: 10; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .form-card { background-color: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; border: 2px solid #ffcc00; }
        .btn-log { background-color: #ffcc00; color: #000; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; margin-bottom: 10px;}
        .btn-gps { background-color: #2563eb; color: #fff; padding: 12px 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-back { background: transparent; border: 1px solid #555; color: #fff; padding: 15px; border-radius: 50px; cursor: pointer; width: 100%; }
        #closeFormBtn { position: relative; z-index: 101; display: block !important; }
        .btn-sub { background-color: #555; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .form-card input { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        #gps-status { display: block; text-align: center; font-size: 0.85em; margin-bottom: 10px; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="duck-flock">
        <img src="Blue Star Duck.png" class="duck-item" style="top:5%; left:2%;">
        <img src="Orange Duck.png" class="duck-item" style="top:15%; right:5%;">
        <img src="Pink Dot Duck.png" class="duck-item" style="top:60%; left:5%;">
        <img src="Teal Duck.png" class="duck-item" style="top:10%; left:35%;">
    </div>

    <header><h1>Travelin' Jeep Ducks</h1></header>
    
    <div class="btn-container">
        <button class="btn-log" style="width: auto;" id="openFormBtn">📍 LOG A DUCK</button>
        <a href="submissions.html" class="btn-sub">🖼️ VIEW SUBMISSIONS</a>
    </div>

    <div class="map-container"><div id="map"></div></div>

    <div class="modal-overlay" id="formModal">
        <div class="form-card">
            <form id="duckForm">
                <input type="text" id="name-input" placeholder="Your Name/Jeep Name" required>
                <input type="text" id="locationInput" placeholder="Location (City, State)" required>
                
                <button type="button" class="btn-gps" id="gps-btn">📍 Pin My Current GPS Spot</button>
                <span id="gps-status"></span>

                <input type="text" id="notes-input" placeholder="Notes or Messages">
                <input type="text" id="photo-url-input" placeholder="Photo Link URL (Optional)">
                
                <input type="hidden" id="lat-input">
                <input type="hidden" id="lng-input">
                
                <button type="submit" class="btn-log" id="submitBtn">Submit Duck</button>
                <button type="button" class="btn-back" id="closeFormBtn">← Back</button>
            </form>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-hoTeWLJRsnheCZvEWFGwdxlfvL0Q6Uk",
    authDomain: "travelinjeepducks.firebaseapp.com",
    projectId: "travelinjeepducks",
    storageBucket: "travelinjeepducks.firebasestorage.app",
    messagingSenderId: "636331255328",
    appId: "1:636331255328:web:60fefdad9007d111d0fe45",
    measurementId: "G-79Z5FD1MF3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let map, userMarker;

  // Render Map Core Setup Engine
  map = L.map('map').setView([39.8283, -98.5795], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
      attribution: '&copy; OpenStreetMap' 
  }).addTo(map);

  // Manual Map Tap Pin Selection Fallback Setup
  map.on('click', function(e) {
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker(e.latlng).addTo(map);
      document.getElementById('lat-input').value = e.latlng.lat;
      document.getElementById('lng-input').value = e.latlng.lng;
  });

  // Modal UI Controls
  const modal = document.getElementById('formModal');
  document.getElementById('openFormBtn').addEventListener('click', () => modal.classList.add('active'));
  document.getElementById('closeFormBtn').addEventListener('click', () => modal.classList.remove('active'));

  const gpsButton = document.getElementById('gps-btn');
  const gpsStatus = document.getElementById('gps-status');
  const latInput = document.getElementById('lat-input');
  const lngInput = document.getElementById('lng-input');
  const duckForm = document.getElementById('duckForm');

  // --- ACTION A: FETCH & RENDER PERMANENT DB PINS ---
  async function loadPermanentPins() {
    try {
      const querySnapshot = await getDocs(collection(db, "duck_finds"));
      querySnapshot.forEach((doc) => {
        const duck = doc.data();
        if (duck.lat && duck.lng) {
          const markerInstance = L.marker([duck.lat, duck.lng]).addTo(map);
          markerInstance.bindPopup(`
            <div style="font-family: Arial, sans-serif; max-width: 200px; color: #121212;">
              <h4 style="margin: 0 0 5px 0; color: #e6b800;">🦆 Duck Logged by ${duck.username || 'Jeep Fan'}!</h4>
              <p style="margin: 0 0 5px 0;"><b>Where:</b> ${duck.locationText || 'On the road'}</p>
              <p style="margin: 0 0 8px 0; font-size: 0.9em;">"${duck.notes}"</p>
              ${duck.photoUrl ? `<img src="${duck.photoUrl}" style="width:100%; border-radius:4px; margin-top:5px;"/>` : ''}
            </div>
          `);
        }
      });
    } catch (error) {
      console.error("Error loading map pins:", error);
    }
  }

  // Load database entries directly on launch
  loadPermanentPins();

  // --- ACTION B: WIRELESS GPS TRACKING ENGINE ---
  if (gpsButton) {
    gpsButton.addEventListener('click', () => {
      if (!navigator.geolocation) {
        gpsStatus.textContent = "GPS not supported by your browser.";
        return;
      }
      gpsStatus.textContent = "Locating your Jeep... Please accept browser permissions popup.";
      gpsButton.disabled = true;

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          latInput.value = latitude;
          lngInput.value = longitude;

          gpsStatus.textContent = `Pinned! Accuracy: ~${Math.round(position.coords.accuracy)}m`;
          gpsButton.disabled = false;

          map.setView([latitude, longitude], 15);
          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.marker([latitude, longitude]).addTo(map).bindPopup("Duck Found Location Set Here!").openPopup();
        },
        (error) => {
          gpsButton.disabled = false;
          gpsStatus.textContent = "Error fetching GPS coordinates. Tap map manually.";
          console.error(error);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });
  }

  // --- ACTION C: SECURE FIRESTORE DATA WRITER ---
  if (duckForm) {
    duckForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Submitting to Master Map...";
      btn.disabled = true;

      let latValue = parseFloat(latInput.value);
      let lngValue = parseFloat(lngInput.value);
      const nameValue = document.getElementById('name-input').value;
      const locationText = document.getElementById('locationInput').value;
      const notesValue = document.getElementById('notes-input').value;
      const photoUrlValue = document.getElementById('photo-url-input').value;

      // Address Address Text Geocoding Fallback if no precise GPS coordinates loaded
      if (isNaN(latValue) || isNaN(lngValue)) {
        try {
          const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationText)}`;
          const res = await fetch(geoUrl);
          const data = await res.json();
          if(data.length > 0) {
              latValue = parseFloat(data[0].lat);
              lngValue = parseFloat(data[0].lon);
          } else {
              alert("Could not process city/state. Please hit 'Pin My Current GPS Spot' or click directly on the background map.");
              btn.innerText = "Submit Duck";
              btn.disabled = false;
              return;
          }
        } catch(err) {
            alert("Location lookup failed. Click the map to drop pin manually!");
            btn.innerText = "Submit Duck";
            btn.disabled = false;
            return;
        }
      }

      try {
        await addDoc(collection(db, "duck_finds"), {
          username: nameValue,
          locationText: locationText,
          lat: latValue,
          lng: lngValue,
          notes: notesValue,
          photoUrl: photoUrlValue,
          timestamp: new Date()
        });

        alert("Duck successfully logged forever! 🦆");
        duckForm.reset();
        if (gpsStatus) gpsStatus.textContent = "";
        modal.classList.remove('active');

        // Clear markers and repaint cleanly
        map.eachLayer((layer) => {
          if (layer instanceof L.Marker) map.removeLayer(layer);
        });
        loadPermanentPins();

      } catch (error) {
        alert("Database error. Verification failed.");
        console.error("Firestore write error:", error);
      } finally {
        btn.innerText = "Submit Duck";
        btn.disabled = false;
      }
    });
  }
</script>
</body>
</html>
