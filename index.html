<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="icon" type="image/svg+xml" href="DuckySVG.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .duck-flock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .duck-item { position: absolute; width: 80px; opacity: 0.7; }
        header, .btn-container, .map-container, .modal-overlay { position: relative; z-index: 100; }
        .btn-container { display: flex; gap: 15px; margin: 20px 0; pointer-events: auto; }
        .map-container { width: 90%; max-width: 900px; height: 500px; margin: 20px 0; border-radius: 12px; overflow: hidden; border: 2px solid #ffcc00; pointer-events: auto; }
        #map { width: 100%; height: 100%; z-index: 10; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .form-card { background-color: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; border: 2px solid #ffcc00; }
        .btn-log { background-color: #ffcc00; color: #000; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-sub { background-color: #555; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="duck-flock">
        <img src="Blue Star Duck.png" class="duck-item" style="top:5%; left:2%;">
        <img src="Orange Duck.png" class="duck-item" style="top:15%; right:5%;">
    </div>

    <header><h1>Travelin' Jeep Ducks</h1></header>
    
    <div class="btn-container">
        <button class="btn-log" id="openFormBtn">📍 LOG A DUCK</button>
        <a href="submissions.html" class="btn-sub">🖼️ VIEW SUBMISSIONS</a>
    </div>

    <div class="map-container"><div id="map"></div></div>

    <div class="modal-overlay" id="formModal">
        <div class="form-card">
            <form id="duckForm">
                <input type="text" name="Name" placeholder="Your Name/Jeep Name" required style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="text" name="Location" placeholder="Location (City, State)" required style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="file" name="file" accept="image/*" required style="width:100%; margin-bottom:10px;">
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lng" id="lng">
                <button type="submit" class="btn-log" style="width:100%">Submit Duck</button>
            </form>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5dtjDjpVNJxgSMFoJMvqxKuX1eMtMZuc2HiTcr5yRR50IRRwcERnvnKlXBDxwsTUY/exec';
    let map, marker;

    window.onload = function() {
        map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            // Save coordinates to hidden fields
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
        });
    };

    // Modal behavior
    document.getElementById('openFormBtn').addEventListener('click', () => {
        document.getElementById('formModal').classList.add('active');
    });

    // Form logic
    document.getElementById('duckForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevents page refresh
        
        if(!document.getElementById('lat').value) {
            alert("Please click the map to set location first!");
            return;
        }

        const formData = new FormData(this);
        fetch(SCRIPT_URL, { method: 'POST', body: formData })
        .then(() => {
            alert('Duck logged successfully!');
            document.getElementById('formModal').classList.remove('active');
            this.reset();
        })
        .catch(err => {
            console.error(err);
            alert('Error: Make sure your Google Apps Script is deployed as "Anyone" access.');
        });
    });
</script>
</body>
</html>
