<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <style>
        /* Modern, clean dark theme with a vibrant accent color */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }

        h1 {
            color: #ffcc00; /* Classic duck yellow */
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .cta-container {
            margin: 30px 0;
            text-align: center;
            z-index: 10;
        }

        /* Large, unmissable button for users scanning on mobile */
        .btn-log {
            display: inline-block;
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-log:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.5);
        }

        .btn-log:active {
            transform: translateY(1px);
        }

        .map-container {
            width: 90%;
            max-width: 900px;
            height: 500px;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #2c2c2c;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Floating Transparent Chibi Duck Layout Styles */
        .duck-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .duck-item {
            position: absolute;
            width: 90px; /* Size of floating chibi background ducks */
            height: auto;
            opacity: 0.25; /* Subtle transparency so background is non-distracting */
        }

        /* Positions and rotations for unique look layout */
        .duck-1 { top: 12%; left: 4%; transform: rotate(-15deg); }
        .duck-2 { top: 25%; left: 86%; transform: rotate(15deg); }
        .duck-3 { top: 55%; left: 5%; transform: rotate(20deg); }
        .duck-4 { top: 68%; left: 84%; transform: rotate(-10deg); }

        /* Showcase gallery layout row underneath the map */
        .duck-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            width: 90%;
            max-width: 900px;
            margin-bottom: 50px;
            z-index: 10;
        }

        .duck-row img {
            width: 85px; /* Size of clear ducks in lower gallery */
            height: auto;
            transition: transform 0.3s;
        }

        .duck-row img:hover {
            transform: scale(1.15) rotate(5deg);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="duck-pattern">
        <img src="Yellow Duck Hat.png" class="duck-item duck-1" alt="Yellow Duck with Hat">
        <img src="Blue Star Duck.png" class="duck-item duck-2" alt="Blue Star Duck">
        <img src="Pink Dot Duck.png" class="duck-item duck-3" alt="Pink Dot Duck">
        <img src="Purple Googles Duck.png" class="duck-item duck-4" alt="Purple Goggles Duck">
    </div>

    <header>
        <h1>🦆 Travelin' Jeep Ducks 🦆</h1>
        <p class="subtitle">You found a duck! This little bird is on an epic cross-country road trip. Check out the map below to see where it's been, and log your location to keep the journey going!</p>
    </header>

    <div class="cta-container">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf-73IE035uWizBMzmJ5ILhL38AEsig5vWb_olGx43tFLxMyQ/viewform?usp=publish-editor" target="_blank" class="btn-log">📍 I FOUND A DUCK! LOG IT HERE</a>
    </div>

    <div class="map-container">
        <iframe src="https://www.google.com/maps/d/embed?mid=1CKMI4vBF9BzP09ifWqQ9XzQEPqMDfCU&ehbc=2E312F"></iframe>
    </div>

    <div class="duck-row">
        <img src="Yellow Duck Hat.png" alt="Yellow Duck Hat">
        <img src="Orange Duck.png" alt="Orange Duck">
        <img src="Orange Stripe Duck.png" alt="Orange Stripe Duck">
        <img src="Pink Dot Duck.png" alt="Pink Dot Duck">
        <img src="Purple Googles Duck.png" alt="Purple Goggles Duck">
        <img src="Rainbow Duck.png" alt="Rainbow Duck">
        <img src="Teal Duck with Leaf.png" alt="Teal Duck with Leaf">
        <img src="Teal Duck.png" alt="Teal Duck">
        <img src="Yellow Duck.png" alt="Yellow Duck">
        <img src="Blue Star Duck.png" alt="Blue Star Duck">
    </div>

    <footer>
        © 2026 Travelin' Jeep Ducks. Duck, Duck, Jeep!
    </footer>

</body>
</html>
