<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Chibi Scattering */
        .duck-scatter { position: fixed; width: 80px; z-index: 1; pointer-events: none; opacity: 0.8; }
        #duck-1 { top: 20px; left: 20px; transform: rotate(-15deg); }
        #duck-2 { bottom: 20px; right: 20px; transform: rotate(15deg); }
        #duck-3 { top: 150px; right: 40px; }
        #duck-4 { bottom: 100px; left: 40px; }

        header { text-align: center; padding: 40px 20px; width: 100%; z-index: 2; }
        .title-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .title-duck { width: 50px; height: auto; }
        h1 { color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .cta-container { margin: 20px 0; display: flex; gap: 20px; z-index: 2; }
        .btn-log, .btn-view { padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; cursor: pointer; }
        .btn-log { background-color: #ffcc00; color: #000; border: none; }
        .btn-view { background-color: transparent; color: #ffcc00; border: 2px solid #ffcc00; }
        
        .map-container { width: 90%; max-width: 900px; height: 500px; border-radius: 12px; overflow: hidden; border: 2px solid #2c2c2c; z-index: 2; }
        #map { width: 100%; height: 100%; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .form-card { background-color: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <img src="Purple Goggles Duck.png" class="duck-scatter" id="duck-1" alt="Duck">
    <img src="Orange Duck.png" class="duck-scatter" id="duck-2" alt="Duck">
    <img src="Purple Goggles Duck.png" class="duck-scatter" id="duck-3" alt="Duck">
    <img src="Orange Duck.png" class="duck-scatter" id="duck-4" alt="Duck">

    <header>
        <div class="title-container">
            <img src="Purple Goggles Duck.png" class="title-duck" alt="Duck">
            <h1>Travelin' Jeep Ducks</h1>
            <img src="Orange Duck.png" class="title-duck" alt="Duck">
        </div>
    </header>

    <div class="cta-container">
        <button class="btn-log" id="openFormBtn">📍 LOG A DUCK</button>
        <a href="submissions.html" class="btn-view">👀 VIEW SUBMISSIONS</a>
    </div>

    <div class="map-container"> <div id="map"></div> </div>

    <div class="modal-overlay" id="formModal">
        <div class="form-card">
            <form id="duckForm">
                <input type="text" name="Name" placeholder="Your Name" required style="width:100%; margin-bottom:10px; padding: 10px;">
                <input type="text" name="Location" placeholder="Location" required style="width:100%; margin-bottom:10px; padding: 10px;">
                <textarea name="Notes" placeholder="Message" style="width:100%; margin-bottom:10px; padding: 10px;"></textarea>
                <button type="submit" class="btn-log" style="width:100%">Submit</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        // Ensure this is your /exec URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5dtjDjpVNJxgSMFoJMvqxKuX1eMtMZuc2HiTcr5yRR50IRRwcERnvnKlXBDxwsTUY/exec';

        function loadDucks() {
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    data.forEach(duck => {
                        if(duck.Location) {
                            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(duck.Location)}`)
                                .then(res => res.json())
                                .then(geo => {
                                    if (geo.length > 0) {
                                        L.marker([geo[0].lat, geo[0].lon]).addTo(map).bindPopup(`<b>${duck.Name}</b><br>${duck.Notes}`);
                                    }
                                });
                        }
                    });
                });
        }
        loadDucks();

        // Modal triggers
        document.getElementById('openFormBtn').onclick = () => document.getElementById('formModal').classList.add('active');
        
        // Form Submission
        document.getElementById('duckForm').onsubmit = function(e) {
            e.preventDefault();
            fetch(SCRIPT_URL, { method: 'POST', body: new FormData(this) })
            .then(() => {
                alert('Duck logged!');
                document.getElementById('formModal').classList.remove('active');
                loadDucks();
            });
        };
    </script>
</body>
</html>
