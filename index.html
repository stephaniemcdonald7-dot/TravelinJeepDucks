<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelin' Jeep Ducks</title>
    <style>
        /* Modern, clean dark theme with a vibrant accent color */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #ffcc00; /* Classic duck yellow */
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .cta-container {
            margin: 30px 0;
            text-align: center;
        }

        /* Large, unmissable button for users scanning on mobile */
        .btn-log {
            display: inline-block;
            background-color: #ffcc00;
            color: #121212;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-log:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.5);
        }

        .btn-log:active {
            transform: translateY(1px);
        }

        .map-container {
            width: 90%;
            max-width: 900px;
            height: 500px;
            margin-bottom: 50px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #2c2c2c;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        /* Styling for floating duck background */
        .duck-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6; /* Bumped up opacity to make sure they display bright and clear */
        }

        .duck-item {
            position: absolute;
            font-size: 4rem; /* Size of the ducks */
        }

        /* Specific colors and rotation for a few duck instances */
        .duck-1 { color: #ffeb3b; top: 12%; left: 6%; transform: rotate(-15deg); }   /* Bright Yellow */
        .duck-2 { color: #00d2ff; top: 25%; left: 88%; transform: rotate(10deg); }   /* Neon Blue */
        .duck-3 { color: #39ff14; top: 55%; left: 8%; transform: rotate(20deg); }    /* Neon Green */
        .duck-4 { color: #ff007f; top: 68%; left: 85%; transform: rotate(-10deg); }  /* Hot Pink */
        .duck-5 { color: #ff9800; top: 88%; left: 45%; transform: rotate(-25deg); }  /* Bright Orange */
    </style>
</head>
<body>

    <!-- Floating Background Ducks -->
    <div class="duck-pattern">
        <div class="duck-item duck-1">🦆</div>
        <div class="duck-item duck-2">🦆</div>
        <div class="duck-item duck-3">🦆</div>
        <div class="duck-item duck-4">🦆</div>
        <div class="duck-item duck-5">🦆</div>
    </div>

    <header>
        <h1>🦆 Travelin' Jeep Ducks 🦆</h1>
        <p class="subtitle">You found a duck! This little bird is on an epic cross-country road trip. Check out the map below to see where it's been, and log your location to keep the journey going!</p>
    </header>

    <div class="cta-container">
        <!-- Google Form Link -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf-73IE035uWizBMzmJ5ILhL38AEsig5vWb_olGx43tFLxMyQ/viewform?usp=publish-editor" target="_blank" class="btn-log">📍 I FOUND A DUCK! LOG IT HERE</a>
    </div>

    <div class="map-container">
        <!-- Live Google Map Link -->
        <iframe src="https://www.google.com/maps/d/embed?mid=1CKMI4vBF9BzP09ifWqQ9XzQEPqMDfCU&ehbc=2E312F"></iframe>
    </div>

    <footer>
        &copy; 2026 Travelin' Jeep Ducks. Duck, Duck, Jeep!
    </footer>

</body>
</html>
